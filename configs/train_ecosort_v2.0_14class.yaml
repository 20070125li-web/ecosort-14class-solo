# EcoSort V6 14-Class Training Configuration
# Fully based on V5 checkpoint configuration
#
# V6 vs V5 Changes (still 14 classes):
# - haz_chemical → plastic (merged to reduce mutual confusion)
# - complex_misc → split into small_hard_items, foam, brick_ceramic (reduce visual confusion)
# - ceramic → brick_ceramic (merged with brick)
# Net change: 14 - 1 + 2 - 1 = 14 classes

experiment_name: ecosort_v2.0_14class_effb3

# Model Configuration (identical to V5)
model:
  type: efficientnet
  backbone: efficientnet-b3
  num_classes: 14          # V6 still uses 14 classes
  pretrained: true
  dropout: 0.3

# Data Configuration (identical to V5)
data:
  root_dir: data/proc/ecosort_v6_14class
  img_size: 224            # Letterbox resize to 224x224
  batch_size: 24
  val_split: 0.2
  shuffle: true
  num_workers: 4

  # Class balancing (same as V5: disable class weights, enable weighted sampling)
  use_class_weights: false
  normalize_class_weights: false
  use_weighted_sampler: true

# Training Configuration (identical to V5)
training:
  epochs: 30                # V5 used 30 epochs
  learning_rate: 0.0004
  optimizer: adamw
  weight_decay: 0.0001
  scheduler: cosine
  gradient_clip_val: 1.0
  early_stopping_patience: 7 # V5 used 7
  monitor_metric: val_f1
  monitor_mode: max
  use_amp: true             # V5 used mixed precision training

# Loss Function (identical to V5)
loss:
  type: cross_entropy
  label_smoothing: 0.03

# Data Augmentation (identical to V5)
augmentation:
  strong_aug: true
  random_erasing_prob: 0.12

# Checkpoint (identical to V5)
checkpoint:
  dir: checkpoints
  save_best_only: true
  save_interval: 5

# WandB Configuration (updated with V6 tags)
wandb:
  project: ecosort-daily-life
  entity: null
  tags:
    - ecosort-v6
    - 14-class
    - efficientnet-b3
    - v5-config-replica
  notes: |
    V6 14-class - Full replication of V5 configuration:
    - haz_chemical → plastic (merged)
    - complex_misc → split into small_hard_items, foam, brick_ceramic
    - Training parameters identical to ecosort_v5_14class_effb3_letterbox224
    - Based on 9018 original images
    - Random seed: 20260301 