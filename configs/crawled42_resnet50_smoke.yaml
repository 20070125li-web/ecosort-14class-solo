model:
  type: "resnet"
  backbone: "resnet50"
  num_classes: 42
  pretrained: true
  dropout: 0.3
  use_attention: false

data:
  root_dir: "data/proc/crawled_v1"
  img_size: 224
  batch_size: 32
  num_workers: 4
  val_split: 0.2
  shuffle: true
  use_class_weights: true

training:
  epochs: 1
  learning_rate: 0.0005
  optimizer: "adamw"
  weight_decay: 0.0001
  scheduler: "cosine"
  use_amp: true
  early_stopping_patience: 2
  gradient_clip_val: 1.0

loss:
  type: "cross_entropy"
  label_smoothing: 0.05

checkpoint:
  dir: "checkpoints"
  save_interval: 1
  save_best_only: true

wandb:
  project: "ecosort-crawled42"
  entity: null
  tags: ["smoke", "42-class", "resnet50"]
  notes: "smoke test"
