# EcoSort Baseline Configuration - ResNet50

# Model Configuration
model:
  type: "resnet"               # Backbone network type
  backbone: "resnet50"         # Specific backbone architecture
  num_classes: 6               # Number of classification categories
  pretrained: true             # Whether to use pretrained weights
  dropout: 0.3                 # Dropout rate to prevent overfitting
  use_attention: false         # Whether to enable attention mechanism

# Data Configuration
data:
  root_dir: "data/raw"         # Root directory of raw image data
  img_size: 256                # Image resize dimension (pixels)
  batch_size: 32               # Batch size for training/validation
  num_workers: 4               # Number of worker processes for data loading
  val_split: 0.2               # Proportion of data used for validation (20%)
  shuffle: true                # Whether to shuffle training data

# Training Configuration
training:
  epochs: 50                   # Total training epochs
  learning_rate: 0.001         # Initial learning rate
  optimizer: "adamw"           # Optimizer type (AdamW)
  weight_decay: 0.0001         # Weight decay for optimizer (L2 regularization)
  scheduler: "cosine"          # Learning rate scheduler (cosine annealing)
  use_amp: true                # Whether to use automatic mixed precision training
  early_stopping_patience: 10  # Epochs to wait before early stopping (no improvement)
  gradient_clip_val: 1.0       # Maximum norm for gradient clipping

# Loss Function
loss:
  type: "cross_entropy"        # Loss function type (cross entropy)
  label_smoothing: 0.1         # Label smoothing factor to reduce overconfidence

# Data Augmentation
augmentation:
  horizontal_flip_prob: 0.5    # Probability of horizontal flip augmentation
  vertical_flip_prob: 0.2      # Probability of vertical flip augmentation
  rotation_degrees: 15         # Maximum rotation angle (degrees)
  color_jitter:                # Color jitter augmentation parameters
    brightness: 0.3            # Brightness variation range
    contrast: 0.3              # Contrast variation range
    saturation: 0.3            # Saturation variation range

# Checkpoint Configuration
checkpoint:
  dir: "checkpoints"           # Directory to save model checkpoints
  save_interval: 10            # Epoch interval for saving checkpoints
  save_best_only: true         # Only save the checkpoint with best validation performance

# WandB Configuration (Weights & Biases)
wandb:
  project: "ecosort-classification"  # WandB project name
  entity: null                       # WandB entity (team/user name)
  tags: ["baseline", "resnet50"]     # Tags for experiment organization
