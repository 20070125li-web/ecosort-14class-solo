# EcoSort TrashNet 6-Class Configuration - ResNet50
# Use class weighting to handle slight data imbalance

# Model Configuration
model:
  type: "resnet"
  backbone: "resnet50"
  num_classes: 6
  pretrained: true
  dropout: 0.3
  use_attention: false

# Data Configuration
data:
  root_dir: "data/raw"
  img_size: 224  # ResNet standard input size
  batch_size: 32
  num_workers: 4
  val_split: 0.2
  shuffle: true

  # TrashNet 6-class sample distribution (for class weighting)
  # paper: 594, glass: 501, plastic: 482, metal: 410, cardboard: 403, trash: 137
  class_counts: [594, 501, 482, 410, 403, 137]
  use_class_weights: true  # Enable class weighting

# Training Configuration
training:
  epochs: 50
  learning_rate: 0.001
  optimizer: "adamw"
  weight_decay: 0.0001
  scheduler: "cosine"
  use_amp: true
  early_stopping_patience: 10
  gradient_clip_val: 1.0

# Loss Function
loss:
  type: "cross_entropy"
  label_smoothing: 0.1
  # Class weights will be automatically calculated from class_counts during training

# Data Augmentation (optimized for TrashNet)
augmentation:
  horizontal_flip_prob: 0.5
  vertical_flip_prob: 0.0  # Vertical flip is unnecessary for trash images
  rotation_degrees: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
  random_crop: true
  scale_range: [0.8, 1.0]  # Random crop scale range

# Checkpoint Configuration
checkpoint:
  dir: "checkpoints"
  save_interval: 10
  save_best_only: true

# WandB Configuration
wandb:
  project: "ecosort-trashnet"
  entity: null
  tags: ["trashnet", "6-class", "resnet50"]
  notes: "TrashNet 6-class classification with class weighting"
