# EcoSort Optimized Configuration - ResNet50
# 目标准确率: 85%+

# 模型配置
model:
  type: "resnet"
  backbone: "resnet50"
  num_classes: 42  # 42类细粒度分类
  pretrained: true
  dropout: 0.4  # 增加dropout防止过拟合
  use_attention: false

# 数据配置
data:
  root_dir: "data/proc/crawled_v1"
  img_size: 256  # 提高分辨率
  batch_size: 24  # 降低batch size适应更大图片
  num_workers: 4
  val_split: 0.15  # 减少验证集比例
  shuffle: true
  use_class_weights: true  # 使用类别权重处理不平衡

# 训练配置 - 优化策略
training:
  epochs: 60  # 增加训练轮数
  learning_rate: 0.0003  # 降低初始学习率
  warmup_epochs: 5  # 添加warmup
  optimizer: "adamw"
  weight_decay: 0.0001
  scheduler: "cosine"
  use_amp: true
  early_stopping_patience: 12  # 增加耐心值
  gradient_clip_val: 1.0

# 损失函数 - 使用更强的正则化
loss:
  type: "cross_entropy"
  label_smoothing: 0.1

# 数据增强 - 大幅增强
augmentation:
  horizontal_flip_prob: 0.5
  vertical_flip_prob: 0.3
  rotation_degrees: 20
  color_jitter:
    brightness: 0.3
    contrast: 0.3
    saturation: 0.3
    hue: 0.1
  random_erasing_prob: 0.2  # 随机擦除
  gaussian_blur_prob: 0.1  # 高斯模糊

# 检查点配置
checkpoint:
  dir: "checkpoints"
  save_interval: 10
  save_best_only: true

# WandB 配置
wandb:
  project: "ecosort-classification"
  entity: null
  tags: ["optimized", "resnet50", "42classes"]
