model:
  type: "efficientnet"
  backbone: "efficientnet-b3"
  num_classes: 15
  pretrained: true
  dropout: 0.3

data:
  root_dir: "data/proc/ecosort_v6_15class"
  img_size: 224
  batch_size: 24
  num_workers: 4
  val_split: 0.2
  shuffle: true
  use_class_weights: false
  use_weighted_sampler: true

augmentation:
  strong_aug: true
  random_erasing_prob: 0.12

training:
  epochs: 30
  learning_rate: 0.0004
  optimizer: "adamw"
  weight_decay: 0.0001
  scheduler: "cosine"
  use_amp: true
  monitor_metric: "val_f1"
  monitor_mode: "max"
  early_stopping_patience: 7
  gradient_clip_val: 1.0

loss:
  type: "cross_entropy"
  label_smoothing: 0.03

checkpoint:
  dir: "checkpoints"
  save_interval: 5
  save_best_only: true

wandb:
  project: "ecosort-daily-life"
  entity: null
  tags: ["ecosort-v6", "15-class", "efficientnet-b3", "letterbox-224"]
  notes: "v6 mapping retrain with same setting as v5 effb3 letterbox224 baseline"
