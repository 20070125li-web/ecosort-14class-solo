# 图片爬取关键词配置
# 说明：
# 1) class_name 是落盘目录名，会写入 data/raw/<class_name>/
# 2) keywords 建议中英混合，覆盖同义词与真实场景描述
# 3) target_count 是该类总目标数量（脚本会按关键词轮询抓取）

classes:
  # === 可回收物 (Recyclable) - 基础类 ===
  cardboard:
    target_count: 300
    keywords:
      - cardboard waste
      - corrugated box trash
      - flattened cardboard
      - 废纸箱 垃圾
      - 快递纸箱 堆积

  glass:
